<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

#tabs {
    display: flex;
    background: #1a1a1a;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
}

.tab.active { background: #444; }

#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    position: relative;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

#inputBox {
    padding: 10px;
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
}

#controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    background: #2a2a2a;
    color: #eee;
    border: none;
    border-radius: 8px;
}

.correct { color: #6f6; }
.wrong { color: #f66; }
</style>
</head>

<body>

<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file</div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer or key..." />
    </div>

    <div id="controls"></div>

</div>

<script>
let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;
let deck=[], deckIndex=0;
let currentTab="nav";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const controls=document.getElementById("controls");
const input=document.getElementById("answerInput");

/* ===== KEY MAP ===== */
const keyMap = {
    p:"prev", n:"next", s:"start", r:"randomCard",
    a:"showAnswer", m:"toggleMem", v:"toggleSkip", c:"clearOutput",
    j:"jump", f:"setFuzzy", t:"showStats"
};

/* ===== SAVE ===== */
function saveState(){
    localStorage.setItem("flashcards_data", JSON.stringify({
        answers, memorized, correct, wrong, q, skipMode
    }));
}

/* ===== LOAD ===== */
window.addEventListener("load", ()=>{
    const saved = localStorage.getItem("flashcards_data");
    if(saved){
        const d = JSON.parse(saved);
        answers=d.answers||[];
        memorized=d.memorized||[];
        correct=d.correct||[];
        wrong=d.wrong||[];
        q=d.q||0;
        skipMode=d.skipMode||false;
        showQ();
    }
});

/* ===== CORE ===== */
function normalize(str){return str.toLowerCase().replace(/[^a-z0-9]/g,"");}

function similarityPercentage(a,b){
    a=normalize(a); b=normalize(b);
    if(!a||!b) return a===b?100:0;
    let dp=Array(a.length+1).fill().map(()=>Array(b.length+1).fill(0));
    for(let i=0;i<=a.length;i++) dp[i][0]=i;
    for(let j=0;j<=b.length;j++) dp[0][j]=j;
    for(let i=1;i<=a.length;i++){
        for(let j=1;j<=b.length;j++){
            dp[i][j]=Math.min(
                dp[i-1][j]+1,
                dp[i][j-1]+1,
                dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)
            );
        }
    }
    let dist=dp[a.length][b.length];
    return 100-(dist/Math.max(a.length,b.length))*100;
}

/* ===== NAV ===== */
function next(){ q=(q+2)%answers.length; saveState(); showQ(); }
function prev(){ q=(q-2+answers.length)%answers.length; saveState(); showQ(); }
function start(){ q=0; saveState(); showQ(); }

function showQ(){
    if(!answers.length) return;
    let t=answers[q];
    if(memorized[q]) t+=" [MEM]";
    if(skipMode) t+=" [SKIP]";
    qEl.textContent=t;
    aEl.textContent="";
}

/* ===== ACTIONS ===== */
function showAnswer(){ aEl.textContent=answers[q+1]; }
function toggleMem(){ memorized[q]=!memorized[q]; saveState(); showQ(); }
function toggleSkip(){ skipMode=!skipMode; saveState(); showQ(); }
function clearOutput(){ aEl.textContent=""; }

/* ===== RANDOM ===== */
function randomCard(){
    q = Math.floor(Math.random()*(answers.length/2))*2;
    saveState();
    showQ();
}

/* ===== FILE ===== */
function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n");
        memorized=Array(answers.length).fill(false);
        correct=Array(answers.length).fill(false);
        wrong=Array(answers.length).fill(false);
        q=0; skipMode=false;
        saveState();
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

/* ===== INPUT ===== */
input.addEventListener("keydown", e=>{
    if(e.key!=="Enter") return;

    let val=input.value.trim().toLowerCase();
    input.value="";

    if(val.length===1 && keyMap[val]){
        window[keyMap[val]]();
        return;
    }

    let sim=similarityPercentage(val,answers[q+1]);

    if(sim>=fuzzy){
        aEl.innerHTML=`<span class="correct">Correct ${sim.toFixed(0)}%</span><br>${answers[q+1]}`;
        correct[q]=true;
    } else {
        aEl.innerHTML=`<span class="wrong">Wrong ${sim.toFixed(0)}%</span><br>${answers[q+1]}`;
        wrong[q]=true;
    }

    saveState();
});

/* ===== UI ===== */
function setTab(tab,el){
    currentTab=tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderButtons();
}

function renderButtons(){
    controls.innerHTML="";
    const btn=(l,f,k)=>`<button onclick="${f}()">${l} [${k}]</button>`;

    if(currentTab==="nav"){
        controls.innerHTML=
            btn("Prev","prev","P")+
            btn("Next","next","N")+
            btn("Start","start","S")+
            btn("Random","randomCard","R");
    }

    if(currentTab==="actions"){
        controls.innerHTML=
            btn("Answer","showAnswer","A")+
            btn("Mem","toggleMem","M")+
            btn("Skip","toggleSkip","V")+
            btn("Clear","clearOutput","C");
    }

    if(currentTab==="tools"){
        controls.innerHTML=
            btn("Jump","jump","J")+
            btn("Fuzzy","setFuzzy","F")+
            btn("Stats","showStats","T")+
            `<input type="file" onchange="loadFile(event)">`;
    }
}

renderButtons();
</script>

</body>
</html>
