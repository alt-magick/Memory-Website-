<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active { background: #444; }

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    position: relative;
    touch-action: none;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
    margin-top: 12px;
}

/* INPUT */
#inputBox {
    padding: 10px;
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
}

/* CONTROLS */
#controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 12px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

.correct { color: #6f6; }
.wrong { color: #f66; }
</style>
</head>

<body>

<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load file</div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<script>
let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;
let currentTab="nav";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const controls=document.getElementById("controls");
const input=document.getElementById("answerInput");
const card=document.getElementById("card");

/* ===== IMPORTANT FIX ===== */
function isUIElement(e){
    return e.target.closest("button") || e.target.closest("input") || e.target.closest("textarea");
}

/* ===== GESTURES ===== */
let startX=0, startY=0;
let holdTimer=null;
let moved=false;
let hold=false;

card.addEventListener("pointerdown",(e)=>{

    // ✅ FIX: allow buttons to work
    if(isUIElement(e)) return;

    startX=e.clientX;
    startY=e.clientY;
    moved=false;
    hold=false;

    holdTimer=setTimeout(()=>{
        hold=true;
        toggleMem(); // HOLD
    },500);
});

card.addEventListener("pointermove",(e)=>{
    let dx=e.clientX-startX;
    let dy=e.clientY-startY;
    if(Math.abs(dx)>10 || Math.abs(dy)>10) moved=true;
});

card.addEventListener("pointerup",(e)=>{
    clearTimeout(holdTimer);

    let dx=e.clientX-startX;
    let dy=e.clientY-startY;

    if(hold) return;

    // TAP
    if(!moved && Math.abs(dx)<10 && Math.abs(dy)<10){
        showAnswer();
        return;
    }

    // VERTICAL
    if(Math.abs(dy)>Math.abs(dx) && Math.abs(dy)>60){
        if(dy>0) start();
        else randomCard();
        return;
    }

    // HORIZONTAL
    if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>60){
        if(dx>0) prev();
        else next();
    }
});

card.addEventListener("pointercancel",()=>{
    clearTimeout(holdTimer);
});

/* ===== CORE ===== */
function showQ(){
    if(!answers.length) return;
    qEl.textContent=answers[q]||"";
    aEl.textContent="";
}

function showAnswer(){
    aEl.textContent=answers[q+1]||"";
}

/* ===== NAV ===== */
function next(){ q+=2; if(q>=answers.length) q=0; showQ(); }
function prev(){ q-=2; if(q<0) q=0; showQ(); }
function start(){ q=0; showQ(); }

function randomCard(){
    q=Math.floor(Math.random()*(answers.length/2))*2;
    showQ();
}

/* ===== ACTIONS ===== */
function toggleMem(){ memorized[q]=!memorized[q]; }
function toggleSkip(){ skipMode=!skipMode; }
function clearOutput(){ aEl.textContent=""; }

/* ===== FILE LOAD ===== */
function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n");
        memorized=Array(answers.length).fill(false);
        correct=Array(answers.length).fill(false);
        wrong=Array(answers.length).fill(false);
        q=0;
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

/* ===== INPUT ===== */
input.addEventListener("keydown",e=>{
    if(e.key!=="Enter") return;
    let val=input.value;
    input.value="";
    aEl.innerHTML=`Answer: ${answers[q+1]}`;
});

/* ===== UI ===== */
function setTab(tab,el){
    currentTab=tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderButtons();
}

function renderButtons(){
    controls.innerHTML="";
    const btn=(t,f)=>`<button onclick="${f}">${t}</button>`;

    if(currentTab==="nav"){
        controls.innerHTML=
            btn("Prev","prev()")+
            btn("Next","next()")+
            btn("Start","start()")+
            btn("Random","randomCard()");
    }

    if(currentTab==="actions"){
        controls.innerHTML=
            btn("Answer","showAnswer()")+
            btn("Mem","toggleMem()")+
            btn("Skip","toggleSkip()")+
            btn("Clear","clearOutput()");
    }

    if(currentTab==="tools"){
        controls.innerHTML=
            btn("Load","document.querySelector('input[type=file]').click()")+
            `<input type="file" onchange="loadFile(event)">`;
    }
}

renderButtons();
</script>

</body>
</html>
