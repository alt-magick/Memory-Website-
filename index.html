<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Flashcards</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: #111;
            color: #eee;
            font-family: system-ui;
            overflow: hidden;
        }

        #app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* TABS */
        #tabs {
            display: flex;
            background: #1a1a1a;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #222;
            user-select: none;
        }

        .tab.active {
            background: #444;
        }

        /* CARD */
        #card {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            min-height: 0;
            position: relative;
            touch-action: none;
        }

        #question {
            font-size: clamp(22px, 6vw, 30px);
            color: #f6c344;
            margin-bottom: 16px;
        }

        #answer {
            font-size: clamp(20px, 5.5vw, 26px);
        }

        /* INPUT */
        #inputBox {
            flex-shrink: 0;
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: #1a1a1a;
        }

        #answerInput {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: #eee;
            outline: none;
        }

        /* CONTROLS */
        #controls {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 10px;
            background: #1a1a1a;
        }

        button {
            padding: 14px;
            font-size: 15px;
            border: none;
            background: #2a2a2a;
            color: #eee;
            border-radius: 8px;
        }

        .correct {
            color: #6f6;
        }

        .wrong {
            color: #f66;
        }

        /* MODAL */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #modalContent {
            width: 100%;
            max-width: 500px;
            background: #1b1b1b;
            border-radius: 12px;
            padding: 16px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="tabs">
            <div class="tab active" onclick="setTab('nav', this)">Nav</div>
            <div class="tab" onclick="setTab('actions', this)">Actions</div>
            <div class="tab" onclick="setTab('tools', this)">Tools</div>
        </div>

        <div id="card">
            <div id="question">
                Nav:<br> Prev, Next, Start, Random<br><br>
                Actions:<br> Answer, Clear, Mem, Skip<br><br>
                Tools:<br> Jump, Fuzzy, Stats, Load File<br><br>
                Swipe:<br> Left / Right (Next / Prev)<br> Up (Rand)<br> Down (Start)<br> Tap (Answer)<br> Hold (Mem)
            </div>
            <div id="answer"></div>
        </div>

        <div id="inputBox">
            <input id="answerInput" placeholder="Type answer..." />
        </div>

        <div id="controls"></div>
    </div>

    <div id="modal" onclick="closeModal(event)">
        <div id="modalContent"></div>
    </div>

    <script>
        let answers = [], memorized = [], correct = [], wrong = [];
let totalCorrect = 0, totalWrong = 0;
        let q = 0, skipMode = false, fuzzy = 50;
        let deck = [], deckIndex = 0;
        let currentTab = "nav";
        let answerVisible = false;
        
        const qEl = document.getElementById("question");
        const aEl = document.getElementById("answer");
        const controls = document.getElementById("controls");
        const input = document.getElementById("answerInput");
        const card = document.getElementById("card");
        const modal = document.getElementById("modal");
        const modalContent = document.getElementById("modalContent");
modalContent.addEventListener("click", function (e) {
    e.stopPropagation();
});
        /* ===== HAPTIC ===== */
        function haptic(pattern = 10) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        /* ===== SWIPE + TAP + HOLD ===== */
        let startX = 0, startY = 0;
        let holdTimer = null;
        let isHold = false;
        let moved = false;

        card.addEventListener("pointerdown", (e) => {
            startX = e.clientX;
            startY = e.clientY;
            isHold = false;
            moved = false;
            holdTimer = setTimeout(() => {
                if (!moved) {
                    isHold = true;
                    toggleMem();
                }
            }, 500);
        });

        card.addEventListener("pointermove", (e) => {
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                moved = true;
            }
        });

        card.addEventListener("pointerup", (e) => {
            clearTimeout(holdTimer);

            let dx = e.clientX - startX;
            let dy = e.clientY - startY;

            if (isHold) return;

            if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 80) {
                if (dy > 0) start();
                else randomCard();
                return;
            }

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
                dx > 0 ? prev() : next();
                return;
            }

            showAnswer();
        });

        card.addEventListener("pointercancel", () => {
            clearTimeout(holdTimer);
        });

        /* ===== CORE ===== */
        function normalize(str) {
            return str.toLowerCase().replace(/[^a-z0-9]/g, "");
        }

        function similarityPercentage(a, b) {
            a = normalize(a);
            b = normalize(b);

            if (!a.length && !b.length) return 100;
            if (!a.length || !b.length) return 0;

            let dp = Array(a.length + 1).fill().map(() => Array(b.length + 1).fill(0));

            for (let i = 0; i <= a.length; i++) dp[i][0] = i;
            for (let j = 0; j <= b.length; j++) dp[0][j] = j;

            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1,
                        dp[i][j - 1] + 1,
                        dp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
                    );
                }
            }

            let dist = dp[a.length][b.length];
            let maxLen = Math.max(a.length, b.length);
            return 100 - (dist / maxLen) * 100;
        }

        /* ===== NAV ===== */
        function next() {
            let i = q + 2;
            while (i < answers.length && !isValidCard(i)) i += 2;
            if (i >= answers.length) {
                i = 0;
                while (i < answers.length && !isValidCard(i)) i += 2;
            }
            q = i;
            showQ();
        }

        function prev() {
            let i = q - 2;
            while (i >= 0 && !isValidCard(i)) i -= 2;
            if (i < 0) {
                i = answers.length - 2;
                while (i >= 0 && !isValidCard(i)) i -= 2;
            }
            q = i;
            showQ();
        }

        function start() { q = 0; showQ(); }

        function isValidCard(i) {
            if (i < 0 || i >= answers.length) return false;
            if (skipMode && memorized[i]) return false;
            return true;
        }

        /* ===== DISPLAY ===== */
        function showQ() {
            if (!answers.length) return;
            let t = answers[q];
            if (memorized[q]) t += " [MEM]";
            if (skipMode) t += " [SKIP]";
            qEl.textContent = t;
            aEl.textContent = "";
            answerVisible = false;
        }
    modal.addEventListener("click", function () {
    modal.style.display = "none";
});
        
function setFuzzy() {
    let value = prompt("Set fuzzy threshold (0–100):", fuzzy);
    if (value === null) return;

    value = Number(value);
    if (isNaN(value)) return;

    fuzzy = Math.max(0, Math.min(100, value));
            }
        
  function showStats() {
    let total = answers.length / 2;

let correctCount = totalCorrect;
let wrongCount = totalWrong;
      
    let memCount = memorized.filter(Boolean).length;

    let attempted = correctCount + wrongCount;
    let accuracy = attempted ? (correctCount / attempted) * 100 : 0;

    modalContent.innerHTML =
        "Stats<br><br>" +
        "Total cards: " + total + "<br>" +
        "Correct: " + correctCount + "<br>" +
        "Wrong: " + wrongCount + "<br>" +
        "Accuracy: " + accuracy.toFixed(1) + "%<br>" +
        "Memorized: " + memCount;

    modal.style.display = "flex";
  }
        function jump() {
    modalContent.innerHTML = `
        <h3>Search question cards</h3>
        <input id="jumpInput"
            type="text"
            placeholder="Type to search..."
            style="width:100%;padding:10px;font-size:16px;border-radius:8px;border:none;outline:none;background:#222;color:#eee;">
        <br><br>
        <button onclick="doJump()">Search</button>
    `;

    modal.style.display = "flex";
}

function doJump() {
    let query = document.getElementById("jumpInput").value;
    if (!query) return;

    query = query.toLowerCase();

    // search ONLY question cards (even indexes)
    for (let i = 0; i < answers.length; i += 2) {
        if ((answers[i] || "").toLowerCase().includes(query)) {
            q = i;
            showQ();
            modal.style.display = "none";
            return;
        }
    }

    modalContent.innerHTML = "<p>No match found</p>";
            }
        
        /* ===== ACTIONS ===== */  
        
function showAnswer() {
    if (answerVisible) {
        aEl.innerHTML = "";
        answerVisible = false;
    } else {
        aEl.innerHTML = answers[q + 1];
        answerVisible = true;
    }
}

        function toggleMem() { memorized[q] = !memorized[q]; showQ(); }
        function toggleSkip() { skipMode = !skipMode; showQ(); }
        function clearOutput() { aEl.textContent = ""; }

        /* ===== RANDOM ===== */
function randomCard() {
    // rebuild if empty OR invalid cards exist
    if (deckIndex >= deck.length) {
        deck = [];
        for (let i = 0; i < answers.length; i += 2) {
            if (isValidCard(i)) deck.push(i);
        }
        deck.sort(() => Math.random() - 0.5);
        deckIndex = 0;
    }

    // 🔥 skip invalid cards dynamically
    while (deckIndex < deck.length && !isValidCard(deck[deckIndex])) {
        deckIndex++;
    }

    if (deckIndex < deck.length) {
        q = deck[deckIndex++];
        showQ();
    } else {
        // rebuild if everything got filtered out
        deck = [];
        deckIndex = 0;
        randomCard();
    }
}
        /* ===== FILE LOAD ===== */
        function loadFile(e) {
            const r = new FileReader();
            r.onload = () => {
                answers = r.result.split("\n");
                memorized = Array(answers.length).fill(false);
                correct = Array(answers.length).fill(false);
                wrong = Array(answers.length).fill(false);
                totalCorrect = 0;
                totalWrong = 0;
                q = 0;
                showQ();
            };
            r.readAsText(e.target.files[0]);
        }

        /* ===== INPUT ===== */
        input.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;

    let val = input.value;
    input.value = "";

    let sim = similarityPercentage(val, answers[q + 1]);

    if (sim >= fuzzy) {
    totalCorrect++; // ✅ ADD
    aEl.innerHTML = `<span class="correct">Correct ${sim.toFixed(0)}%</span><br>${answers[q + 1]}`;
    correct[q] = true;
} else {
    totalWrong++; // ✅ ADD
    haptic([30, 40, 30]);
    aEl.innerHTML = `<span class="wrong">Wrong ${sim.toFixed(0)}%</span><br>${answers[q + 1]}`;
    wrong[q] = true;
    }

    answerVisible = true; // 🔥 THIS is the key fix
});
        /* ===== UI ===== */
        function setTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            el.classList.add("active");
            renderButtons();
        }

        function renderButtons() {
            controls.innerHTML = "";
            const btn = (t, f) => `<button onclick="${f}">${t}</button>`;

            if (currentTab === "nav") {
                controls.innerHTML =
                    btn("Prev", "prev()") +
                    btn("Next", "next()") +
                    btn("Start", "start()") +
                    btn("Random", "randomCard()");
            }

            if (currentTab === "actions") {
                controls.innerHTML =
                    btn("Answer", "showAnswer()") +
                    btn("Mem", "toggleMem()") +
                    btn("Skip", "toggleSkip()") +
                    btn("Clear", "clearOutput()");
            }

            if (currentTab === "tools") {
                controls.innerHTML =
                    btn("Jump", "jump()") +
                    btn("Fuzzy", "setFuzzy()") +
                    btn("Stats", "showStats()") +
                    `<input type="file" onchange="loadFile(event)">`;
            }
        }

        renderButtons();
    </script>

</body>

</html>
