<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active { background: #444; }

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
    position: relative;
    touch-action: none;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

/* INPUT */
#inputBox {
    flex-shrink: 0;
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
    outline: none;
}

/* CONTROLS */
#controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    font-size: 15px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

.correct { color: #6f6; }
.wrong { color: #f66; }

/* MODAL */
#helpModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

#helpBox {
    width: 100%;
    max-width: 520px;
    background: #1b1b1b;
    border-radius: 12px;
    padding: 16px;
    color: #ddd;
}

#helpTitle {
    font-size: 20px;
    color: #f6c344;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="app">
    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file</div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<!-- HELP MODAL -->
<div id="helpModal" onclick="closeHelp()">
    <div id="helpBox">
        <div id="helpTitle">How to Use</div>

        👆 Tap → Show answer<br><br>
        ✋ Hold → Toggle MEM<br><br>

        ↔ Swipe → Next / Prev<br>
        🔼 Swipe up → Random card<br>
        🔽 Swipe down → Start<br><br>

        📁 Load file → Import flashcards<br><br>

        <div style="text-align:center;color:#888;margin-top:10px;">
            Tap anywhere to continue
        </div>
    </div>
</div>

<script>

let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false;

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const card=document.getElementById("card");

/* ===== HELP ===== */
window.addEventListener("load",()=>{
    document.getElementById("helpModal").style.display="flex";
});

function closeHelp(){
    document.getElementById("helpModal").style.display="none";
}

/* ===== SWIPE + TAP + HOLD ===== */
let startX=0,startY=0;
let holdTimer=null;
let moved=false;
let isHold=false;

card.addEventListener("pointerdown",(e)=>{
    startX=e.clientX;
    startY=e.clientY;
    moved=false;
    isHold=false;

    holdTimer=setTimeout(()=>{
        if(!moved){
            isHold=true;
            toggleMem();
        }
    },500);
});

card.addEventListener("pointermove",(e)=>{
    if(Math.abs(e.clientX-startX)>10 || Math.abs(e.clientY-startY)>10){
        moved=true;
    }
});

card.addEventListener("pointerup",(e)=>{
    clearTimeout(holdTimer);

    let dx=e.clientX-startX;
    let dy=e.clientY-startY;

    if(isHold) return;

    // vertical swipe
    if(Math.abs(dy)>Math.abs(dx) && Math.abs(dy)>80){
        if(dy<0) randomCard();
        else start();
        return;
    }

    // horizontal swipe
    if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>60){
        dx>0 ? prev() : next();
        return;
    }

    // TAP = SHOW ANSWER
    showAnswer();
});

/* ===== CORE ===== */
function showAnswer(){
    if(!answers.length) return;
    aEl.textContent = answers[q+1];
}

function toggleMem(){
    memorized[q]=!memorized[q];
    showQ();
}

function start(){ q=0; showQ(); }

function next(){ q+=2; if(q>=answers.length) q=0; showQ(); }
function prev(){ q-=2; if(q<0) q=answers.length-2; showQ(); }

function randomCard(){
    q=Math.floor(Math.random()*(answers.length/2))*2;
    showQ();
}

function showQ(){
    if(!answers.length) return;
    let t=answers[q];
    if(memorized[q]) t+=" [MEM]";
    qEl.textContent=t;
    aEl.textContent="";
}

/* ===== FILE ===== */
function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n");
        memorized=Array(answers.length).fill(false);
        q=0;
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

/* ===== INIT HELP ===== */
document.getElementById("helpModal").style.display="flex";

</script>

</body>
</html>
