<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

#tabs {
    display: flex;
    background: #1a1a1a;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
}

.tab.active { background: #444; }

#card {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    touch-action: none;
}

#question {
    font-size: 24px;
    color: #f6c344;
}

#answer {
    font-size: 20px;
    margin-top: 12px;
}

#controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 12px;
    background: #2a2a2a;
    color: #eee;
    border: none;
    border-radius: 8px;
}

.correct { color: #6f6; }
.wrong { color: #f66; }
</style>
</head>

<body>

<div id="app">
    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file to begin</div>
        <div id="answer"></div>
    </div>

    <div id="controls"></div>
</div>

<script>
let qa = [];          // [question, answer, question, answer...]
let q = 0;

let memorized = [];
let correct = [];
let wrong = [];

let fuzzy = 50;
let currentTab = "nav";

/* ---------- SAFE HELPERS ---------- */
function getQ() {
    return qa[q] ?? "";
}

function getA() {
    return qa[q + 1] ?? "";
}

/* ---------- DISPLAY ---------- */
function showQ() {
    document.getElementById("question").textContent = getQ();
    document.getElementById("answer").textContent = "";
}

function showAnswer() {
    document.getElementById("answer").textContent = getA();
}

/* ---------- NAV ---------- */
function next() {
    if (q + 2 < qa.length) q += 2;
    showQ();
}

function prev() {
    if (q - 2 >= 0) q -= 2;
    showQ();
}

function start() {
    q = 0;
    showQ();
}

/* ---------- CORE ---------- */
function normalize(s) {
    return (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
}

function similarity(a, b) {
    a = normalize(a);
    b = normalize(b);

    if (!a && !b) return 100;
    if (!a || !b) return 0;

    let dp = Array(a.length + 1).fill().map(() => Array(b.length + 1).fill(0));

    for (let i = 0; i <= a.length; i++) dp[i][0] = i;
    for (let j = 0; j <= b.length; j++) dp[0][j] = j;

    for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
            dp[i][j] = Math.min(
                dp[i-1][j] + 1,
                dp[i][j-1] + 1,
                dp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1)
            );
        }
    }

    let dist = dp[a.length][b.length];
    return 100 - (dist / Math.max(a.length, b.length)) * 100;
}

/* ---------- INPUT CHECK ---------- */
document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;

    let val = document.querySelector("input")?.value || "";
    document.querySelector("input").value = "";

    let score = similarity(val, getA());

    const ans = document.getElementById("answer");

    if (score >= fuzzy) {
        correct[q] = true;
        ans.innerHTML = `<span class="correct">Correct ${score.toFixed(0)}%</span><br>${getA()}`;
    } else {
        wrong[q] = true;
        ans.innerHTML = `<span class="wrong">Wrong ${score.toFixed(0)}%</span><br>${getA()}`;
    }
});

/* ---------- TOOLS ---------- */
function jump() {
    let n = parseInt(prompt("Jump to card #"));
    if (!isNaN(n)) {
        let i = n * 2;
        if (i >= 0 && i < qa.length) {
            q = i;
            showQ();
        }
    }
}

function setFuzzy() {
    let n = parseInt(prompt("Fuzzy (0-100)", fuzzy));
    if (!isNaN(n)) fuzzy = Math.max(0, Math.min(100, n));
}

function showStats() {
    alert(
        "Total: " + qa.length / 2 +
        "\nCorrect: " + correct.filter(Boolean).length +
        "\nWrong: " + wrong.filter(Boolean).length +
        "\nMem: " + memorized.filter(Boolean).length
    );
}

/* ---------- FILE LOAD (FIXED) ---------- */
function loadFile(e) {
    const r = new FileReader();

    r.onload = () => {
        let lines = r.result.split("\n").map(x => x.trim()).filter(Boolean);

        qa = lines;

        memorized = Array(qa.length).fill(false);
        correct = Array(qa.length).fill(false);
        wrong = Array(qa.length).fill(false);

        q = 0;
        showQ();
    };

    r.readAsText(e.target.files[0]);
}

/* ---------- UI ---------- */
function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    renderButtons();
}

function renderButtons() {
    const c = document.getElementById("controls");

    const btn = (t,f) => `<button onclick="${f}">${t}</button>`;

    if (currentTab === "nav") {
        c.innerHTML =
            btn("Prev","prev()") +
            btn("Next","next()") +
            btn("Start","start()");
    }

    if (currentTab === "actions") {
        c.innerHTML =
            btn("Answer","showAnswer()");
    }

    if (currentTab === "tools") {
        c.innerHTML =
            btn("Jump","jump()") +
            btn("Fuzzy","setFuzzy()") +
            btn("Stats","showStats()") +
            `<input type="file" onchange="loadFile(event)">`;
    }
}

renderButtons();
</script>

</body>
</html>
