<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active { background: #444; }

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    position: relative;
    touch-action: pan-y;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

#card::after {
    content: "← swipe →";
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 12px;
    color: #555;
}

/* CONTROLS */
#controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    font-size: 15px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

/* HIDDEN COMMAND INPUT */
#cmd {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    height: 0;
    width: 0;
}

.correct { color: #6f6; }
.wrong { color: #f66; }
</style>
</head>

<body>

<div id="app">
    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file</div>
        <div id="answer"></div>
    </div>

    <div id="controls"></div>
</div>

<!-- Hidden keyboard catcher -->
<input id="cmd" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

<script>
let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;
let deck=[], deckIndex=0;
let currentTab="nav";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const controls=document.getElementById("controls");
const cmd=document.getElementById("cmd");
const card=document.getElementById("card");

/* ===== KEEP MOBILE KEYBOARD OPEN ===== */
function keepFocus(){
    if (document.activeElement !== cmd) cmd.focus();
}
setInterval(keepFocus, 300);
document.body.addEventListener("touchstart", () => cmd.focus());

/* ===== SWIPE ===== */
let startX=0, startY=0;

card.addEventListener("pointerdown",(e)=>{
    startX=e.clientX;
    startY=e.clientY;
});

card.addEventListener("pointerup",(e)=>{
    let dx=e.clientX-startX;
    let dy=e.clientY-startY;
    if(Math.abs(dx)<60) return;
    if(Math.abs(dx)<Math.abs(dy)) return;
    dx>0 ? prev() : next();
});

/* ===== CORE ===== */
function normalize(str){
    return (str||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

function similarityPercentage(a,b){
    a=normalize(a); b=normalize(b);
    if(!a.length && !b.length) return 100;
    if(!a.length || !b.length) return 0;

    let dp=Array(a.length+1).fill().map(()=>Array(b.length+1).fill(0));

    for(let i=0;i<=a.length;i++) dp[i][0]=i;
    for(let j=0;j<=b.length;j++) dp[0][j]=j;

    for(let i=1;i<=a.length;i++){
        for(let j=1;j<=b.length;j++){
            dp[i][j]=Math.min(
                dp[i-1][j]+1,
                dp[i][j-1]+1,
                dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)
            );
        }
    }

    let dist=dp[a.length][b.length];
    let maxLen=Math.max(a.length,b.length);
    return 100-(dist/maxLen)*100;
}

/* ===== NAV ===== */
function next(){ q = Math.min(q+2, answers.length-2); showQ(); }
function prev(){ q = Math.max(q-2, 0); showQ(); }
function start(){ q=0; showQ(); }

/* ===== DISPLAY ===== */
function showQ(){
    if(!answers.length) return;
    let t=answers[q]||"";
    if(memorized[q]) t+=" [MEM]";
    if(skipMode) t+=" [SKIP]";
    qEl.textContent=t;
    aEl.textContent="";
}

/* ===== ACTIONS ===== */
function showAnswer(){ aEl.textContent=answers[q+1]||""; }
function toggleMem(){ memorized[q]=!memorized[q]; showQ(); }
function toggleSkip(){ skipMode=!skipMode; showQ(); }
function clearOutput(){ aEl.textContent=""; }

/* ===== RANDOM ===== */
function randomCard(){
    if(deckIndex>=deck.length){
        deck=[];
        for(let i=0;i<answers.length;i+=2){
            deck.push(i);
        }
        deck.sort(()=>Math.random()-0.5);
        deckIndex=0;
    }
    q=deck[deckIndex++]||0;
    showQ();
}

/* ===== COMMAND ENGINE (NO INPUT BOX) ===== */
cmd.addEventListener("input", () => {
    const val = cmd.value.trim().toLowerCase();
    cmd.value = "";

    if(!val) return;

    // COMMANDS
    switch(val){
        case "n": next(); return;
        case "p": prev(); return;
        case "a": showAnswer(); return;
        case "m": toggleMem(); return;
        case "v": toggleSkip(); return;
        case "c": clearOutput(); return;
        case "r": randomCard(); return;
        case "s": start(); return;
        case "j": jump(); return;
        case "f": setFuzzy(); return;
        case "t": showStats(); return;
    }

    // ANSWER MODE
    let sim = similarityPercentage(val, answers[q+1]);

    if(sim >= fuzzy){
        aEl.innerHTML = `<span class="correct">Correct ${sim.toFixed(0)}%</span><br>${answers[q+1]}`;
        correct[q]=true;
    } else {
        aEl.innerHTML = `<span class="wrong">Wrong ${sim.toFixed(0)}%</span><br>${answers[q+1]}`;
        wrong[q]=true;
    }
});

/* ===== FILE LOAD ===== */
function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n").filter(x=>x.trim()!=="");
        memorized=Array(answers.length).fill(false);
        correct=Array(answers.length).fill(false);
        wrong=Array(answers.length).fill(false);
        q=0;
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

/* ===== STUBS ===== */
function jump(){ q = prompt("Jump to card #")*2 || 0; showQ(); }
function setFuzzy(){ fuzzy = Number(prompt("Fuzzy (0-100)", fuzzy)); }
function showStats(){
    alert(`Correct: ${correct.filter(Boolean).length}\nWrong: ${wrong.filter(Boolean).length}`);
}

/* ===== INIT ===== */
showQ();
keepFocus();
</script>

</body>
</html>
