<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
}

.tab.active { background: #444; }

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    position: relative;
    touch-action: pan-y;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

/* INPUT */
#inputBox {
    flex-shrink: 0;
    padding: 10px;
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
}

/* BUTTONS */
#controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #2a2a2a;
    color: #eee;
}

/* SWIPE */
#card::after {
    content: "← swipe →";
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 12px;
    color: #555;
}

/* CORRECT */
.correct { color: #6f6; }
.wrong { color: #f66; }

/* ===== MODAL ===== */
#modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
}

#modalBox {
    width: min(90%, 400px);
    background: #1a1a1a;
    padding: 16px;
    border-radius: 12px;
}

#modalTitle {
    margin-bottom: 10px;
    font-size: 18px;
}

#modalInput {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: #eee;
}

#modalBtn {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    background: #444;
    border: none;
    color: #fff;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file</div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<!-- ===== MODAL ===== -->
<div id="modal">
    <div id="modalBox">
        <div id="modalTitle"></div>
        <input id="modalInput" />
        <button id="modalBtn">OK</button>
    </div>
</div>

<script>

let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;

const qEl=document.getElementById("question");
const input=document.getElementById("answerInput");

/* ===== MODAL SYSTEM ===== */
const modal=document.getElementById("modal");
const modalTitle=document.getElementById("modalTitle");
const modalInput=document.getElementById("modalInput");
const modalBtn=document.getElementById("modalBtn");

let modalCallback=null;

function openModal(title, placeholder, cb){
    modalTitle.textContent=title;
    modalInput.value="";
    modalInput.placeholder=placeholder;
    modal.style.display="flex";
    modalCallback=cb;
    modalInput.focus();
}

modalBtn.onclick=()=>{
    if(modalCallback){
        modalCallback(modalInput.value);
    }
    modal.style.display="none";
};

modal.addEventListener("click",(e)=>{
    if(e.target===modal) modal.style.display="none";
});

/* ===== SWIPE ===== */
let startX=0,startY=0;

document.getElementById("card").addEventListener("pointerdown",e=>{
    startX=e.clientX;
    startY=e.clientY;
});

document.getElementById("card").addEventListener("pointerup",e=>{
    let dx=e.clientX-startX;
    let dy=e.clientY-startY;

    if(Math.abs(dx)<60) return;
    if(Math.abs(dx)<Math.abs(dy)) return;

    dx>0 ? prev() : next();
});

/* ===== CORE ===== */

function next(){ q+=2; showQ(); }
function prev(){ q-=2; showQ(); }

function showQ(){
    if(!answers.length) return;
    let t=answers[q]||"";
    qEl.textContent=t;
}

/* ===== BUTTON ACTIONS ===== */

function jump(){
    openModal("Jump Search", "Enter word...", (query)=>{
        query=query.toLowerCase().trim();
        for(let i=0;i<answers.length;i+=2){
            if(answers[i].toLowerCase().includes(query)){
                q=i;
                showQ();
                break;
            }
        }
    });
}

function setFuzzy(){
    openModal("Set Fuzzy (0-100)", fuzzy, (val)=>{
        val=Number(val);
        if(!isNaN(val)){
            fuzzy=Math.max(0,Math.min(100,val));
        }
    });
}

function showStats(){
    let total=Math.floor(answers.length/2);
    alert(`Cards: ${total}`);
}

/* ===== UI ===== */

function renderButtons(){
    document.getElementById("controls").innerHTML=`
        <button onclick="prev()">Prev</button>
        <button onclick="next()">Next</button>
        <button onclick="jump()">Jump</button>
        <button onclick="setFuzzy()">Fuzzy</button>
        <button onclick="showStats()">Stats</button>
    `;
}

renderButtons();

</script>

</body>
</html>
