<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active {
    background: #444;
}

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
    position: relative;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

/* INPUT */
#inputBox {
    flex-shrink: 0;
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
    outline: none;
}

/* CONTROLS */
#controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

button {
    padding: 14px;
    font-size: 15px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

/* swipe hint FIXED */
#card::after {
    content: "← swipe →";
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 12px;
    color: #555;
    pointer-events: none;
}

.correct { color: #6f6; }
.wrong { color: #f66; }

@media (max-width: 400px) {
    button {
        padding: 12px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div id="app">

    <!-- TABS -->
    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <!-- CARD -->
    <div id="card">
        <div id="question">Load a file</div>
        <div id="answer"></div>
    </div>

    <!-- INPUT -->
    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <!-- CONTROLS -->
    <div id="controls"></div>

</div>

<script>

let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;
let deck=[], deckIndex=0;
let currentTab="nav";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const controls=document.getElementById("controls");
const input=document.getElementById("answerInput");
const card=document.getElementById("card");

function normalize(str){
    return str.toLowerCase().replace(/[^a-z0-9]/g,"");
}

function similarityPercentage(a,b){
    a=normalize(a); b=normalize(b);
    if(!a.length && !b.length) return 100;
    if(!a.length || !b.length) return 0;

    let dp=Array(a.length+1).fill().map(()=>Array(b.length+1).fill(0));

    for(let i=0;i<=a.length;i++) dp[i][0]=i;
    for(let j=0;j<=b.length;j++) dp[0][j]=j;

    for(let i=1;i<=a.length;i++){
        for(let j=1;j<=b.length;j++){
            dp[i][j]=Math.min(
                dp[i-1][j]+1,
                dp[i][j-1]+1,
                dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)
            );
        }
    }

    let dist=dp[a.length][b.length];
    let maxLen=Math.max(a.length,b.length);
    return 100-(dist/maxLen)*100;
}

function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n");
        memorized=Array(answers.length).fill(false);
        correct=Array(answers.length).fill(false);
        wrong=Array(answers.length).fill(false);
        q=0;
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

function showQ(){
    if(!answers.length) return;
    let t=answers[q];
    if(memorized[q]) t+=" [MEM]";
    if(skipMode) t+=" [SKIP]";
    qEl.textContent=t;
    aEl.textContent="";
}

function isValidCard(i){
    if(i<0||i>=answers.length) return false;
    if(skipMode&&memorized[i]) return false;
    return true;
}

function next(){
    let i=q+2;
    while(i<answers.length&&!isValidCard(i)) i+=2;
    if(i>=answers.length){
        i=0;
        while(i<answers.length&&!isValidCard(i)) i+=2;
    }
    q=i;
    showQ();
}

function prev(){
    let i=q-2;
    while(i>=0&&!isValidCard(i)) i-=2;
    if(i<0){
        i=answers.length-2;
        while(i>=0&&!isValidCard(i)) i-=2;
    }
    q=i;
    showQ();
}

function start(){
    q=0;
    showQ();
}

function showAnswer(){ aEl.textContent=answers[q+1]; }
function toggleMem(){ memorized[q]=!memorized[q]; showQ(); }
function toggleSkip(){ skipMode=!skipMode; showQ(); }
function clearOutput(){ aEl.textContent=""; }

function randomCard(){
    if(deckIndex>=deck.length){
        deck=[];
        for(let i=0;i<answers.length;i+=2){
            if(isValidCard(i)) deck.push(i);
        }
        deck.sort(()=>Math.random()-0.5);
        deckIndex=0;
    }
    if(deck.length){
        q=deck[deckIndex++];
        showQ();
    }
}

function setTab(tab,el){
    currentTab=tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderButtons();
}

function renderButtons(){
    controls.innerHTML="";
    const btn=(t,f)=>`<button onclick="${f}">${t}</button>`;

    if(currentTab==="nav"){
        controls.innerHTML=
            btn("Prev","prev()")+
            btn("Next","next()")+
            btn("Start","start()")+
            btn("Random","randomCard()");
    }

    if(currentTab==="actions"){
        controls.innerHTML=
            btn("Answer","showAnswer()")+
            btn("Mem","toggleMem()")+
            btn("Skip","toggleSkip()")+
            btn("Clear","clearOutput()");
    }

    if(currentTab==="tools"){
        controls.innerHTML=
            btn("Jump","jump()")+
            btn("Fuzzy","setFuzzy()")+
            btn("Stats","showStats()")+
            `<input type="file" onchange="loadFile(event)">`;
    }
}

function wrap(){
    if(q>=answers.length) q=0;
    if(q<0) q=answers.length-2;
    if(!isValidCard(q)){
        next();
        return;
    }
    showQ();
}

input.addEventListener("keydown",e=>{
    if(e.key!=="Enter") return;
    let val=input.value;
    input.value="";
    let sim=similarityPercentage(val,answers[q+1]);

    if(sim>=fuzzy){
        aEl.innerHTML=`<span class="correct">Correct (${sim.toFixed(0)}%)</span>`;
        correct[q]=true;
    } else {
        aEl.innerHTML=`<span class="wrong">Wrong (${sim.toFixed(0)}%)<br>${answers[q+1]}</span>`;
        wrong[q]=true;
    }
});

/* ===== SEARCHABLE JUMP ===== */
function escapeRegExp(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function jump(){
    if(!answers.length) return;

    let cards=[];
    for(let i=0;i<answers.length;i+=2){
        cards.push({index:i,num:(i/2)+1,text:answers[i]});
    }

    let query=prompt("Search cards:");
    if(query===null) return;
    query=query.toLowerCase().trim();

    let regex=new RegExp(`\\b${escapeRegExp(query)}\\b`,"i");

    let results=cards.filter(c=>regex.test(c.text));

    if(results.length===0){
        alert("No matches found");
        return;
    }

    let msg=results.slice(0,15).map((r,i)=>
        `${i+1}. [${r.num}] ${r.text}`
    ).join("\n");

    let pick=prompt("Results:\n\n"+msg+"\n\nEnter result number:");
    if(pick===null) return;

    let chosen=results[Number(pick)-1];
    if(!chosen) return;

    q=chosen.index;
    showQ();
}

function showStats(){
    let totalCards=Math.floor(answers.length/2);
    let correctCount=0;
    let wrongCount=0;

    for(let i=0;i<correct.length;i++){
        if(correct[i]) correctCount++;
        if(wrong[i]) wrongCount++;
    }

    let attempted=correctCount+wrongCount;
    let accuracy=attempted?(correctCount/attempted*100):0;

    alert(
        "FLASHCARD STATS\n\n"+
        "Total cards: "+totalCards+"\n"+
        "Attempted: "+attempted+"\n"+
        "Correct: "+correctCount+"\n"+
        "Wrong: "+wrongCount+"\n"+
        "Accuracy: "+accuracy.toFixed(1)+"%"
    );
}

function setFuzzy(){
    const val=prompt("Set fuzzy threshold (0–100):",fuzzy);
    if(val===null) return;
    const num=Number(val);
    if(isNaN(num)) return;
    fuzzy=Math.max(0,Math.min(100,num));
}

renderButtons();

</script>

</body>
</html>
