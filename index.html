<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active { background: #444; }

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
    position: relative;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

/* INPUT */
#inputBox {
    flex-shrink: 0;
    padding: 10px;
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
}

/* CONTROLS */
#controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    font-size: 15px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

/* MODAL */
#modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
}

#modalContent {
    width: 90%;
    max-width: 400px;
    background: #1b1b1b;
    padding: 16px;
    border-radius: 12px;
}
</style>
</head>

<body>
<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Flashcards</div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal(event)">
    <div id="modalContent"></div>
</div>

<script>
let answers = ["Question 1", "Answer 1"];
let q = 0;
let fuzzy = 50;

const qEl = document.getElementById("question");
const aEl = document.getElementById("answer");
const controls = document.getElementById("controls");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

/* ===== DISPLAY ===== */
function showQ() {
    qEl.textContent = answers[q * 2] || "No data";
    aEl.textContent = "";
}

function showAnswer() {
    aEl.textContent = answers[q * 2 + 1] || "";
}

/* ===== NAV ===== */
function next() {
    q = Math.min(q + 1, (answers.length / 2) - 1);
    showQ();
}

function prev() {
    q = Math.max(q - 1, 0);
    showQ();
}

/* ===== FUZZY MODAL ===== */
function setFuzzy() {
    modal.style.display = "flex";

    modalContent.innerHTML = `
        <h3>Fuzzy Threshold</h3>
        <p>Current: <span id="fval">${fuzzy}</span>%</p>

        <input id="fslider" type="range" min="0" max="100" value="${fuzzy}" style="width:100%">

        <button onclick="applyFuzzy()">Apply</button>
    `;

    const slider = document.getElementById("fslider");
    const label = document.getElementById("fval");

    slider.oninput = () => {
        label.textContent = slider.value;
    };
}

function applyFuzzy() {
    fuzzy = parseInt(document.getElementById("fslider").value, 10);
    modal.style.display = "none";
}

/* close modal */
function closeModal(e) {
    if (e.target === modal) modal.style.display = "none";
}

/* ===== TABS ===== */
function setTab(tab, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    renderButtons(tab);
}

/* ===== BUTTONS ===== */
function renderButtons(tab = "nav") {
    controls.innerHTML = "";

    const btn = (t, f) => `<button onclick="${f}">${t}</button>`;

    if (tab === "nav") {
        controls.innerHTML =
            btn("Prev", "prev()") +
            btn("Next", "next()");
    }

    if (tab === "actions") {
        controls.innerHTML =
            btn("Answer", "showAnswer()");
    }

    if (tab === "tools") {
        controls.innerHTML =
            btn("Fuzzy", "setFuzzy()");
    }
}

renderButtons();
showQ();
</script>

</body>
</html>
