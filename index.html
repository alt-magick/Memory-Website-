<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active { background: #444; }

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
    position: relative;
    touch-action: none;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

/* INPUT */
#inputBox {
    flex-shrink: 0;
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
    outline: none;
}

/* CONTROLS */
#controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    font-size: 15px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

#card::after {
    content: "← swipe → ↑ ↓ tap hold";
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 12px;
    color: #555;
    pointer-events: none;
}

.correct { color: #6f6; }
.wrong { color: #f66; }

/* MODAL */
#modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

#modalContent {
    width: 100%;
    max-width: 500px;
    background: #1b1b1b;
    border-radius: 12px;
    padding: 16px;
    max-height: 80vh;
    overflow-y: auto;
}

.modalBtn {
    width: 100%;
    margin-top: 8px;
}
</style>
</head>

<body>
<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file</div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal(event)">
    <div id="modalContent"></div>
</div>

<script>
let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;
let currentTab="nav";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const controls=document.getElementById("controls");
const input=document.getElementById("answerInput");
const card=document.getElementById("card");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

/* ===== SWIPE + TAP + HOLD ===== */
let startX=0, startY=0;
let holdTimer=null;
let moved=false;

card.addEventListener("pointerdown",(e)=>{
    startX=e.clientX;
    startY=e.clientY;
    moved=false;

    holdTimer=setTimeout(()=>{
        toggleMem(); // HOLD
    },500);
});

card.addEventListener("pointermove",(e)=>{
    if(Math.abs(e.clientX-startX)>10 || Math.abs(e.clientY-startY)>10){
        moved=true;
    }
});

card.addEventListener("pointerup",(e)=>{
    clearTimeout(holdTimer);

    let dx=e.clientX-startX;
    let dy=e.clientY-startY;

    if(Math.abs(dx)<30 && Math.abs(dy)<30){
        if(!moved) showAnswer(); // TAP
        return;
    }

    // VERTICAL SWIPE
    if(Math.abs(dy)>Math.abs(dx)){
        if(dy<-80) randomCard();   // UP
        else if(dy>80) start();    // DOWN
        return;
    }

    // HORIZONTAL SWIPE
    if(dx>60) prev();
    else if(dx<-60) next();
});

/* ===== CORE ===== */
function showQ(){
    if(!answers.length) return;
    let t=answers[q];
    if(memorized[q]) t+=" [MEM]";
    if(skipMode) t+=" [SKIP]";
    qEl.textContent=t;
    aEl.textContent="";
}

function showAnswer(){
    aEl.textContent=answers[q+1]||"";
}

function toggleMem(){
    memorized[q]=!memorized[q];
    showQ();
}

function toggleSkip(){
    skipMode=!skipMode;
    showQ();
}

function start(){ q=0; showQ(); }

/* ===== NAV ===== */
function next(){
    q=(q+2)%answers.length;
    showQ();
}

function prev(){
    q=(q-2+answers.length)%answers.length;
    showQ();
}

/* ===== RANDOM ===== */
function randomCard(){
    q=Math.floor(Math.random()*(answers.length/2))*2;
    showQ();
}

/* ===== FILE ===== */
function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n");
        memorized=Array(answers.length).fill(false);
        correct=Array(answers.length).fill(false);
        wrong=Array(answers.length).fill(false);
        q=0;
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

/* ===== MODAL ===== */
function openModal(html){
    modalContent.innerHTML=html;
    modal.style.display="flex";
}

function closeModal(e){
    if(e.target===modal) modal.style.display="none";
}

/* ===== JUMP ===== */
function jump(){
    openModal(`
        <h2>Jump</h2>
        <input id="jumpInput" style="width:100%;padding:10px;background:#222;color:#fff;border:none;border-radius:8px;">
        <div id="results"></div>
    `);

    let inp=document.getElementById("jumpInput");
    let res=document.getElementById("results");

    inp.oninput=()=>{
        let v=inp.value.toLowerCase();
        let out="";
        for(let i=0;i<answers.length;i+=2){
            if(answers[i].toLowerCase().includes(v)){
                out+=`<button class="modalBtn" onclick="q=${i};showQ();closeModal({target:modal})">${answers[i]}</button>`;
            }
        }
        res.innerHTML=out||"No matches";
    };
}

/* ===== STATS ===== */
function showStats(){
    let c=0,w=0;
    for(let i=0;i<correct.length;i++){
        if(correct[i]) c++;
        if(wrong[i]) w++;
    }
    openModal(`<h2>Stats</h2>
        <p>Correct: ${c}</p>
        <p>Wrong: ${w}</p>
        <button onclick="closeModal({target:modal})">Close</button>`);
}

/* ===== FUZZY ===== */
function setFuzzy(){
    openModal(`
        <h2>Fuzzy</h2>
        <input id="fuzzyInput" value="${fuzzy}" type="number"
        style="width:100%;padding:10px;background:#222;color:#fff;border:none;border-radius:8px;">
        <button class="modalBtn" onclick="
            fuzzy=document.getElementById('fuzzyInput').value;
            closeModal({target:modal});
        ">Save</button>
    `);
}

/* ===== INPUT ===== */
input.addEventListener("keydown",e=>{
    if(e.key!=="Enter") return;
    aEl.textContent=answers[q+1]||"";
});

/* ===== UI ===== */
function setTab(tab,el){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
}

function renderButtons(){
    controls.innerHTML=`
        <button onclick="prev()">Prev</button>
        <button onclick="next()">Next</button>
        <button onclick="start()">Start</button>
        <button onclick="randomCard()">Random</button>
        <button onclick="showAnswer()">Answer</button>
        <button onclick="toggleMem()">Mem</button>
        <button onclick="toggleSkip()">Skip</button>
        <button onclick="jump()">Jump</button>
        <button onclick="setFuzzy()">Fuzzy</button>
        <button onclick="showStats()">Stats</button>
        <input type="file" onchange="loadFile(event)">
    `;
}
renderButtons();

</script>
</body>
</html>
