<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Flashcards</title>

    <style>
        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            background: #111;
            color: #eee;
            font-family: system-ui;
            overflow: hidden;
        }

        #app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        #tabs {
            display: flex;
            background: #1a1a1a;
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #222;
            user-select: none;
        }

        .tab.active {
            background: #444;
        }

        #card {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            min-height: 0;
            position: relative;
            touch-action: none;
        }

        #question {
            font-size: clamp(22px, 6vw, 30px);
            color: #f6c344;
            margin-bottom: 16px;
        }

        #answer {
            font-size: clamp(20px, 5.5vw, 26px);
        }

        #inputBox {
            flex-shrink: 0;
            padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: #1a1a1a;
        }

        #answerInput {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: #eee;
            outline: none;
        }

        #controls {
            flex-shrink: 0;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 10px;
            background: #1a1a1a;
        }

        button {
            padding: 14px;
            font-size: 15px;
            border: none;
            background: #2a2a2a;
            color: #eee;
            border-radius: 8px;
        }

        .correct { color: #6f6; }
        .wrong { color: #f66; }

        /* MODAL */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #modalContent {
            width: 100%;
            max-width: 500px;
            background: #1b1b1b;
            border-radius: 12px;
            padding: 16px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>
<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">
            Nav:<br>
            Prev, Next, Start, Random<br><br>

            Actions:<br>
            Answer, Clear, Mem, Skip<br><br>

            Tools:<br>
            Jump, Fuzzy, Stats, Load File
        </div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<!-- MODAL -->
<div id="modal">
    <div id="modalContent"></div>
</div>

<script>
let answers = [], memorized = [], correct = [], wrong = [];
let q = 0, skipMode = false, fuzzy = 50;
let deck = [], deckIndex = 0;
let currentTab = "nav";

const qEl = document.getElementById("question");
const aEl = document.getElementById("answer");
const controls = document.getElementById("controls");
const input = document.getElementById("answerInput");
const card = document.getElementById("card");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

/* ===== MODAL CLOSE FIX ===== */
modal.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.style.display = "none";
    }
});

/* ===== FUZZY ===== */
function setFuzzy() {
    let value = prompt("Set fuzzy threshold (0–100):", fuzzy);
    if (value === null) return;

    value = Number(value);
    if (isNaN(value)) return;

    fuzzy = Math.max(0, Math.min(100, value));
}

/* ===== STATS ===== */
function showStats() {
    let total = answers.length / 2;

    let correctCount = correct.filter(Boolean).length;
    let wrongCount = wrong.filter(Boolean).length;
    let memCount = memorized.filter(Boolean).length;

    let attempted = correctCount + wrongCount;
    let accuracy = attempted ? (correctCount / attempted) * 100 : 0;

    modalContent.innerHTML = `
        <h2>Stats</h2>
        <p>Total cards: ${total}</p>
        <p>Correct: ${correctCount}</p>
        <p>Wrong: ${wrongCount}</p>
        <p>Accuracy: ${accuracy.toFixed(1)}%</p>
        <p>Memorized: ${memCount}</p>
    `;

    modal.style.display = "flex";
}

/* ===== NAV / CORE ===== */
function next() {
    let i = q + 2;
    while (i < answers.length && !isValidCard(i)) i += 2;
    if (i >= answers.length) {
        i = 0;
        while (i < answers.length && !isValidCard(i)) i += 2;
    }
    q = i;
    showQ();
}

function prev() {
    let i = q - 2;
    while (i >= 0 && !isValidCard(i)) i -= 2;
    if (i < 0) {
        i = answers.length - 2;
        while (i >= 0 && !isValidCard(i)) i -= 2;
    }
    q = i;
    showQ();
}

function start() {
    q = 0;
    showQ();
}

function isValidCard(i) {
    if (i < 0 || i >= answers.length) return false;
    if (skipMode && memorized[i]) return false;
    return true;
}

function showQ() {
    if (!answers.length) return;

    let t = answers[q];
    if (memorized[q]) t += " [MEM]";
    if (skipMode) t += " [SKIP]";

    qEl.textContent = t;
    aEl.textContent = "";
}

/* ===== ACTIONS ===== */
function showAnswer() {
    aEl.textContent = answers[q + 1];
}

function toggleMem() {
    memorized[q] = !memorized[q];
    showQ();
}

function toggleSkip() {
    skipMode = !skipMode;
    showQ();
}

function clearOutput() {
    aEl.textContent = "";
}

/* ===== UI ===== */
function setTab(tab, el) {
    currentTab = tab;

    document.querySelectorAll(".tab").forEach(t =>
        t.classList.remove("active")
    );

    el.classList.add("active");
    renderButtons();
}

function renderButtons() {
    controls.innerHTML = "";
    const btn = (t, f) => `<button onclick="${f}">${t}</button>`;

    if (currentTab === "nav") {
        controls.innerHTML =
            btn("Prev", "prev()") +
            btn("Next", "next()") +
            btn("Start", "start()") +
            btn("Random", "randomCard()");
    }

    if (currentTab === "actions") {
        controls.innerHTML =
            btn("Answer", "showAnswer()") +
            btn("Mem", "toggleMem()") +
            btn("Skip", "toggleSkip()") +
            btn("Clear", "clearOutput()");
    }

    if (currentTab === "tools") {
        controls.innerHTML =
            btn("Jump", "jump()") +
            btn("Fuzzy", "setFuzzy()") +
            btn("Stats", "showStats()") +
            `<input type="file" onchange="loadFile(event)">`;
    }
}

renderButtons();
</script>

</body>
</html>
