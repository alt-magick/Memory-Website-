<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Flashcards</title>

<style>
* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    background: #111;
    color: #eee;
    font-family: system-ui;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* TABS */
#tabs {
    display: flex;
    background: #1a1a1a;
    flex-shrink: 0;
}

.tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    background: #222;
    user-select: none;
}

.tab.active {
    background: #444;
}

/* CARD */
#card {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    min-height: 0;
    position: relative;
    touch-action: pan-y;
}

#question {
    font-size: clamp(22px, 6vw, 30px);
    color: #f6c344;
    margin-bottom: 16px;
}

#answer {
    font-size: clamp(20px, 5.5vw, 26px);
}

/* INPUT */
#inputBox {
    flex-shrink: 0;
    padding: 10px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    background: #1a1a1a;
}

#answerInput {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: #eee;
    outline: none;
}

/* CONTROLS */
#controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
    background: #1a1a1a;
}

button {
    padding: 14px;
    font-size: 15px;
    border: none;
    background: #2a2a2a;
    color: #eee;
    border-radius: 8px;
}

.correct { color: #6f6; }
.wrong { color: #f66; }

/* ===== MODAL ===== */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

#panel {
    width: min(92vw, 420px);
    background: #1a1a1a;
    border-radius: 12px;
    padding: 14px;
}

#panel h3 {
    margin: 0 0 10px 0;
    font-size: 18px;
    color: #f6c344;
}

#panel input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: #eee;
    margin-bottom: 10px;
}

#panelBtn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #444;
    color: white;
}

#panelExtra {
    margin-top: 10px;
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="app">

    <div id="tabs">
        <div class="tab active" onclick="setTab('nav', this)">Nav</div>
        <div class="tab" onclick="setTab('actions', this)">Actions</div>
        <div class="tab" onclick="setTab('tools', this)">Tools</div>
    </div>

    <div id="card">
        <div id="question">Load a file</div>
        <div id="answer"></div>
    </div>

    <div id="inputBox">
        <input id="answerInput" placeholder="Type answer..." />
    </div>

    <div id="controls"></div>
</div>

<!-- MODAL -->
<div id="overlay">
    <div id="panel">
        <h3 id="panelTitle"></h3>
        <input id="panelInput" />
        <button id="panelBtn">OK</button>
        <div id="panelExtra"></div>
    </div>
</div>

<script>

let answers=[], memorized=[], correct=[], wrong=[];
let q=0, skipMode=false, fuzzy=50;
let deck=[], deckIndex=0;
let currentTab="nav";

const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
const controls=document.getElementById("controls");
const input=document.getElementById("answerInput");
const card=document.getElementById("card");

/* ===== SWIPE ===== */
let startX=0, startY=0;

card.addEventListener("pointerdown",(e)=>{
    startX=e.clientX;
    startY=e.clientY;
});

card.addEventListener("pointerup",(e)=>{
    let dx=e.clientX-startX;
    let dy=e.clientY-startY;

    if(Math.abs(dx)<60) return;
    if(Math.abs(dx)<Math.abs(dy)) return;

    dx>0 ? prev() : next();
});

/* ===== CORE ===== */

function normalize(str){
    return str.toLowerCase().replace(/[^a-z0-9]/g,"");
}

function similarityPercentage(a,b){
    a=normalize(a); b=normalize(b);
    if(!a.length && !b.length) return 100;
    if(!a.length || !b.length) return 0;

    let dp=Array(a.length+1).fill().map(()=>Array(b.length+1).fill(0));

    for(let i=0;i<=a.length;i++) dp[i][0]=i;
    for(let j=0;j<=b.length;j++) dp[0][j]=j;

    for(let i=1;i<=a.length;i++){
        for(let j=1;j<=b.length;j++){
            dp[i][j]=Math.min(
                dp[i-1][j]+1,
                dp[i][j-1]+1,
                dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)
            );
        }
    }

    let dist=dp[a.length][b.length];
    let maxLen=Math.max(a.length,b.length);
    return 100-(dist/maxLen)*100;
}

/* ===== NAV ===== */

function next(){ q+=2; showQ(); }
function prev(){ q-=2; showQ(); }
function start(){ q=0; showQ(); }

function isValidCard(i){
    if(i<0||i>=answers.length) return false;
    if(skipMode && memorized[i]) return false;
    return true;
}

/* ===== DISPLAY ===== */

function showQ(){
    if(!answers.length) return;
    let t=answers[q];
    if(memorized[q]) t+=" [MEM]";
    if(skipMode) t+=" [SKIP]";
    qEl.textContent=t;
    aEl.textContent="";
}

/* ===== ACTIONS ===== */

function showAnswer(){ aEl.textContent=answers[q+1]; }
function toggleMem(){ memorized[q]=!memorized[q]; showQ(); }
function toggleSkip(){ skipMode=!skipMode; showQ(); }
function clearOutput(){ aEl.textContent=""; }

/* ===== RANDOM ===== */

function randomCard(){
    if(deckIndex>=deck.length){
        deck=[];
        for(let i=0;i<answers.length;i+=2){
            if(isValidCard(i)) deck.push(i);
        }
        deck.sort(()=>Math.random()-0.5);
        deckIndex=0;
    }
    if(deck.length){
        q=deck[deckIndex++];
        showQ();
    }
}

/* ===== FILE LOAD ===== */

function loadFile(e){
    const r=new FileReader();
    r.onload=()=>{
        answers=r.result.split("\n");
        memorized=Array(answers.length).fill(false);
        correct=Array(answers.length).fill(false);
        wrong=Array(answers.length).fill(false);
        q=0;
        showQ();
    };
    r.readAsText(e.target.files[0]);
}

/* ===== MODAL SYSTEM ===== */

const overlay=document.getElementById("overlay");
const panelTitle=document.getElementById("panelTitle");
const panelInput=document.getElementById("panelInput");
const panelBtn=document.getElementById("panelBtn");
const panelExtra=document.getElementById("panelExtra");

let mode=null;

function openPanel(m){
    mode=m;
    overlay.style.display="flex";
    panelInput.value="";
    panelExtra.innerHTML="";

    if(m==="jump"){
        panelTitle.textContent="Jump Search";
        panelInput.placeholder="Search...";
    }

    if(m==="fuzzy"){
        panelTitle.textContent="Set Fuzzy";
        panelInput.value=fuzzy;
    }

    if(m==="stats"){
        panelTitle.textContent="Stats";

        let total=Math.floor(answers.length/2);
        let c=0,w=0;

        for(let i=0;i<correct.length;i++){
            if(correct[i]) c++;
            if(wrong[i]) w++;
        }

        let a=c+w;
        let acc=a?(c/a*100):0;

        panelExtra.innerHTML=
        `Total: ${total}<br>
        Attempted: ${a}<br>
        Correct: ${c}<br>
        Wrong: ${w}<br>
        Accuracy: ${acc.toFixed(1)}%`;
    }
}

panelBtn.onclick=()=>{
    let v=panelInput.value;

    if(mode==="jump"){
        runJump(v);
    }

    if(mode==="fuzzy"){
        v=Number(v);
        if(!isNaN(v)) fuzzy=Math.max(0,Math.min(100,v));
    }

    overlay.style.display="none";
};

overlay.onclick=(e)=>{
    if(e.target===overlay) overlay.style.display="none";
};

/* ===== TOOL FIXES ===== */

function jump(){ openPanel("jump"); }

function runJump(qry){
    qry=qry.toLowerCase().trim();
    for(let i=0;i<answers.length;i+=2){
        if(answers[i].toLowerCase().includes(qry)){
            q=i;
            showQ();
            return;
        }
    }
}

function setFuzzy(){ openPanel("fuzzy"); }
function showStats(){ openPanel("stats"); }

/* ===== UI ===== */

function setTab(tab,el){
    currentTab=tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderButtons();
}

function renderButtons(){
    controls.innerHTML="";

    const btn=(t,f)=>`<button onclick="${f}">${t}</button>`;

    if(currentTab==="nav"){
        controls.innerHTML=
            btn("Prev","prev()")+
            btn("Next","next()")+
            btn("Start","start()")+
            btn("Random","randomCard()");
    }

    if(currentTab==="actions"){
        controls.innerHTML=
            btn("Answer","showAnswer()")+
            btn("Mem","toggleMem()")+
            btn("Skip","toggleSkip()")+
            btn("Clear","clearOutput()");
    }

    if(currentTab==="tools"){
        controls.innerHTML=
            btn("Jump","jump()")+
            btn("Fuzzy","setFuzzy()")+
            btn("Stats","showStats()")+
            `<input type="file" onchange="loadFile(event)">`;
    }
}

renderButtons();

</script>

</body>
</html>
